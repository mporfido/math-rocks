<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{% block title %}{{ site_name }}{% endblock %}</title>

    <meta name="theme-color" content="#FBFBF6">

    <!-- Font above-the-fold: preload dei pesi visibili subito (titolo + corpo) -->
    <link rel="preload" href="{{ url_for('static', filename='fonts/space-grotesk-700.woff2') }}" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="{{ url_for('static', filename='fonts/ibm-plex-serif-400.woff2') }}" as="font" type="font/woff2" crossorigin>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='components.css') }}">

    {% block extra_css %}{% endblock %}
</head>
<body>
    <header class="main-header">
        <nav class="navbar">
            <a href="{{ url_for('home') }}" class="logo"><span class="logo-mark" aria-hidden="true">✓</span>{{ site_name }}</a>
            <div class="nav-links">
                <a href="{{ url_for('home') }}">Home</a>
            </div>
        </nav>
    </header>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="main-footer">
        <p>{{ footer_text }} &copy; {{ current_year }}</p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
